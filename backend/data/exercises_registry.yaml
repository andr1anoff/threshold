# ══════════════════════════════════════════════════════════════════════
# THRESHOLD — Curated Joint Military Exercise Registry
# ══════════════════════════════════════════════════════════════════════
# This registry is the source of truth for the exercise layer (EX component
# + War Room map). It is maintained BY HAND, with a source URL per entry,
# in the same spirit as UCDP-style curated event data. No LLM writes here.
#
# RULES:
#   region:        one of the 20 canonical theatres, assigned ONLY when the
#                  exercise takes place in/at that theatre. Power-projection
#                  exercises far from any monitored theatre (RIMPAC, Vostok)
#                  get region: null -> they appear on the map but do not
#                  feed any theatre's EX component. Print the choice on the
#                  label, don't smuggle it into the number.
#   status:        confirmed  = officially announced, dates from source
#                  projected  = inferred from an established annual/biennial
#                               cycle; dates approximate until announced
#                  Runtime state (upcoming/active/concluded) is computed
#                  from dates, never stored.
#   scale:         personnel if published; null if unknown (never guess).
#
# MAINTENANCE: ~30 min monthly. Add newly announced exercises, firm up
# projected dates, never delete concluded entries (they are the archive).
# Sync with: python3.11 scripts/sync_exercise_registry.py
# Last review: 2026-07-03
# ══════════════════════════════════════════════════════════════════════

